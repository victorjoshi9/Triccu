# Netlify Configuration for Triccu Finance (Multi-App Coexistence)
#
# This file enables you to deploy the single unified Next.js project on Netlify
# and optionally route separate subdomains or custom Netlify sites directly to 
# their respective sub-applications (Admin, Agent, Customer, Shop).

[build]
  command = "npm run build"
  publish = ".next"

# Configure standard headers for cache efficiency and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# -------------------------------------------------------------
# Redirects & Rewrites for Separate Subdomain Deploys
# -------------------------------------------------------------
# You can map separate Netlify app URLs or custom domains to their respective routes
# so that visitors to that domain see only the specific sub-application at the root.
# Change the site URLs below (e.g., 'yourdomain.com' or "*.netlify.app") to match your configuration.

# 1. Preserve NextJS internal assets & functions globally
[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# 2. ADMIN APP DEPLOYMENT (admin.yourdomain.com -> /admin)
[[redirects]]
  from = "https://triccu-admin.netlify.app/*"
  to = "/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.yourdomain.com/*"
  to = "/admin/:splat"
  status = 200
  force = true

# 3. AGENT APP DEPLOYMENT (agent.yourdomain.com -> /agent)
[[redirects]]
  from = "https://triccu-agent.netlify.app/*"
  to = "/agent/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://agent.yourdomain.com/*"
  to = "/agent/:splat"
  status = 200
  force = true

# 4. SHOP OWNER APP DEPLOYMENT (shop.yourdomain.com -> /shop)
[[redirects]]
  from = "https://triccu-shop.netlify.app/*"
  to = "/shop/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://shop.yourdomain.com/*"
  to = "/shop/:splat"
  status = 200
  force = true

# 5. CUSTOMER APP DEPLOYMENT (customer.yourdomain.com -> /customer)
[[redirects]]
  from = "https://triccu-customer.netlify.app/*"
  to = "/customer/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://customer.yourdomain.com/*"
  to = "/customer/:splat"
  status = 200
  force = true

# 6. DEFAULT FALLBACK
# Serve the main landing index page that displays role routes
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
